name: CI
on: [push, pull_request]
jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./erp-BE
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: yarn install --frozen-lockfile
      - run: yarn typecheck
      - run: yarn test --passWithNoTests
      - run: yarn build

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./erp-FE
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: yarn install --frozen-lockfile
      - run: yarn typecheck
      - run: yarn test --passWithNoTests
      - run: yarn build
